<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanshika Counselling Studio | Premium Online Counselling & Therapy Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        setTimeout(function() {
          const div = document.createElement('div');
          div.style.padding = '24px';
          div.style.background = '#fef2f2';
          div.style.color = '#991b1b';
          div.style.fontFamily = 'monospace';
          div.style.whiteSpace = 'pre-wrap';
          div.style.border = '1px solid #fee2e2';
          div.style.margin = '24px';
          div.style.borderRadius = '12px';
          div.style.boxShadow = '0 10px 15px -3px rgba(0, 0, 0, 0.1)';
          div.innerHTML = '<h3 style="margin-top:0;font-size:16px;font-weight:bold;">[Client-Side Exception]</h3>' + 
                          '<p style="font-size:13px;margin:8px 0;"><strong>Error:</strong> ' + message + '</p>' + 
                          '<p style="font-size:12px;margin:8px 0;color:#7f1d1d;"><strong>Source:</strong> ' + source + ' (Line ' + lineno + ':' + colno + ')</p>' +
                          (error && error.stack ? '<pre style="margin-top:12px;font-size:11px;background:#fca5a5/20;padding:12px;border-radius:6px;overflow-x:auto;">' + error.stack + '</pre>' : '');
          document.body.prepend(div);
        }, 100);
        return false;
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
